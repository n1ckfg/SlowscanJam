<!DOCTYPE html>
<html>
<head>
    <title>SlowscanJam - Encoder/Decoder Pipeline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        #container { display: flex; flex-direction: column; height: 100vh; padding: 10px; }
        .panel { margin-bottom: 10px; }
        .label { color: #ff6b00; margin-bottom: 5px; font-size: 12px; }
        canvas { border: 1px solid #333; width: 640px; height: 360px; image-rendering: pixelated; max-width: 100%; }
        #source { border-color: #0f0; }
        #encoded { border-color: #0ff; }
        #decoded { border-color: #f00; }
        #controls { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #ff6b00; max-width: 280px; z-index: 100; }
        #controls h3 { color: #ff6b00; margin-bottom: 10px; font-size: 14px; }
        .control-row { margin-bottom: 8px; }
        .control-row label { display: block; font-size: 12px; margin-bottom: 3px; }
        .control-row input[type="range"] { width: 100%; }
        .control-row input[type="checkbox"] { width: auto; margin-right: 8px; }
        #status { position: fixed; bottom: 10px; left: 10px; color: #0f0; font-size: 12px; z-index: 100; }
        #startBtn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 18px; background: #ff6b00; color: #000; border: none; cursor: pointer; z-index: 200; }
        #startBtn:hover { background: #ff8c00; }
    </style>
</head>
<body>
    <button id="startBtn">Click to Start Camera</button>
    
    <div id="container">
        <div class="panel">
            <div class="label">SOURCE (Camera Input)</div>
            <canvas id="source" width="320" height="150"></canvas>
        </div>
        <div class="panel">
            <div class="label">ENCODED (Audio Signal Preview)</div>
            <canvas id="encoded" width="320" height="150"></canvas>
        </div>
        <div class="panel">
            <div class="label">DECODED (Output Display)</div>
            <canvas id="decoded" width="640" height="360"></canvas>
        </div>
    </div>
    
    <div id="controls">
        <h3>Encoder/Decoder Controls</h3>
        <div class="control-row">
            <label>Lines: <span id="linesVal">150</span></label>
            <input type="range" id="lines" min="50" max="200" step="10" value="150">
        </div>
        <div class="control-row">
            <label>FPS: <span id="fpsVal">3</span></label>
            <input type="range" id="fps" min="1" max="6" step="0.5" value="3">
        </div>
        <div class="control-row">
            <label>Line Width: <span id="lineWidthVal">2.5</span></label>
            <input type="range" id="lineWidth" min="0.5" max="5" step="0.5" value="2.5">
        </div>
        <div class="control-row">
            <label>Brightness: <span id="brightnessVal">1.0</span></label>
            <input type="range" id="brightness" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-row">
            <label>Saturation: <span id="saturationVal">1.0</span></label>
            <input type="range" id="saturation" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-row">
            <label><input type="checkbox" id="blend" checked> Blend Mode</label>
        </div>
        <div class="control-row">
            <label><input type="checkbox" id="showAudio"> Show Audio Waveform</label>
        </div>
    </div>
    
    <div id="status">Waiting to start...</div>

    <script>
    // ============================================
    // SLOWSCAN ENCODER - Converts video frames to stereo audio
    // ============================================
    class SlowscanEncoder {
        constructor(config = {}) {
            this.sampleRate = config.sampleRate || 96000;
            this.fps = config.fps || 3.0;
            this.lines = config.lines || 150;
            this.pulseLength = config.pulseLength || 0.2 / 1000;
            this.oversample = config.oversample || 10;
            this.bufferSize = 512;
            
            this.hTime = (1 / this.fps / this.lines) * 2;
            this.widthSamples = (this.hTime - (this.pulseLength * 4)) * this.sampleRate;
            this.widthPixels = Math.round(this.widthSamples * this.oversample);
            
            this.pulseLengthSamples = Math.round(this.pulseLength * this.sampleRate * this.oversample);
            
            this.field = 0;
            
            this.leftBuffer = [];
            this.rightBuffer = [];
        }
        
        rgbToYcbcr(r, g, b) {
            let y = 0.299 * r + 0.587 * g + 0.114 * b;
            let cb = -0.168736 * r - 0.331264 * g + 0.5 * b + 128;
            let cr = 0.5 * r - 0.418688 * g - 0.081312 * b + 128;
            return [y, cb, cr];
        }
        
        resamplePoly(arr, down) {
            const factor = down;
            const out = new Float64Array(Math.ceil(arr.length / factor));
            const taps = factor * 4 + 1;
            const filter = new Float64Array(taps);
            let sum = 0;
            
            for (let i = 0; i < taps; i++) {
                let n = i - (taps - 1) / 2;
                filter[i] = n === 0 ? 1.0 : Math.sin(Math.PI * n / factor) / (Math.PI * n);
                filter[i] *= 0.54 - 0.46 * Math.cos(2 * Math.PI * i / (taps - 1));
                sum += filter[i];
            }
            for (let i = 0; i < taps; i++) filter[i] /= sum;
            
            for (let i = 0; i < out.length; i++) {
                let val = 0, center = i * factor;
                for (let j = 0; j < taps; j++) {
                    let idx = center + j - (taps - 1) / 2;
                    if (idx >= 0 && idx < arr.length) val += arr[idx] * filter[j];
                    else if (idx < 0) val += arr[Math.min(-idx, arr.length - 1)] * filter[j];
                    else val += arr[Math.max(0, arr.length - 1 - (idx - arr.length + 1))] * filter[j];
                }
                out[i] = val;
            }
            return out;
        }
        
        encodeFrame(frameData, width, height) {
            this.leftBuffer = [];
            this.rightBuffer = [];
            
            const pulse = new Float64Array(this.pulseLengthSamples).fill(1.0);
            const negPulse = new Float64Array(this.pulseLengthSamples).fill(-1.0);
            const quiet = new Float64Array(this.pulseLengthSamples).fill(0.0);
            
            // Field sync
            if (this.field === 0) {
                this.leftBuffer.push(...negPulse, ...pulse);
                this.rightBuffer.push(...pulse, ...negPulse);
            } else {
                this.leftBuffer.push(...pulse, ...negPulse);
                this.rightBuffer.push(...negPulse, ...pulse);
            }
            this.leftBuffer.push(...quiet);
            this.rightBuffer.push(...quiet);
            
            const halfLines = Math.floor(this.lines / 2);
            const srcHeight = Math.min(height, this.lines);
            const srcWidth = Math.min(width, this.widthPixels);
            
            for (let ln = 0; ln < halfLines; ln++) {
                if (ln !== 0) {
                    if (ln % 2 === 0) {
                        this.leftBuffer.push(...pulse, ...negPulse);
                        this.rightBuffer.push(...pulse, ...negPulse);
                    } else {
                        this.leftBuffer.push(...negPulse, ...pulse);
                        this.rightBuffer.push(...negPulse, ...pulse);
                    }
                    this.leftBuffer.push(...quiet);
                    this.rightBuffer.push(...quiet);
                }
                
                const row = ln * 2 + this.field;
                const srcRow = Math.floor((row / this.lines) * (srcHeight - 1));
                
                const yArr = new Float64Array(this.widthPixels);
                const cArr = new Float64Array(this.widthPixels);
                
                for (let x = 0; x < this.widthPixels; x++) {
                    const srcX = Math.floor((x / this.widthPixels) * (srcWidth - 1));
                    const idx = (srcRow * srcWidth + srcX) * 4;
                    const r = frameData[idx], g = frameData[idx + 1], b = frameData[idx + 2];
                    const [y, cb, cr] = this.rgbToYcbcr(r, g, b);
                    
                    yArr[x] = y / 255.0 - 0.5;
                    cArr[x] = (ln % 2 === 0 ? cb : cr) / 255.0 - 0.5;
                }
                
                this.leftBuffer.push(...yArr);
                this.rightBuffer.push(...cArr);
                this.leftBuffer.push(...quiet);
                this.rightBuffer.push(...quiet);
            }
            
            const leftBuilt = new Float64Array(this.leftBuffer);
            const rightBuilt = new Float64Array(this.rightBuffer);
            
            const resampledLeft = this.resamplePoly(leftBuilt, this.oversample);
            const resampledRight = this.resamplePoly(rightBuilt, this.oversample);
            
            this.field = 1 - this.field;
            
            return {
                left: resampledLeft,
                right: resampledRight
            };
        }
    }
    
    // ============================================
    // SLOWSCAN DECODER - Converts stereo audio back to video
    // ============================================
    class SlowscanDecoder {
        constructor(config = {}) {
            const defaults = {
                bufferSize: 512,
                clearInterval: 50,
                overScan: 0.82,
                hOffset: 0.06525,
                pulseLength: 0.2 / 1000,
                lineWidth: 2.5,
                brightness: 1,
                saturation: 1,
                blend: true,
                hFreq: 225.0,
                vFreq: 3
            };
            
            const cfg = { ...defaults, ...config };
            this.bufferSize = cfg.bufferSize;
            this.hPhase = 0;
            this.vPhase = 0;
            
            this.pulse = { time: 0, timeout: 0, luma: 0, lumaPrev: 0, chroma: 0, chromaPrev: 0, changed: false, ready: false };
            this.timing = { time: 0, lastV: 0, lastH: 0 };
            this.field = 0;
            this.chromaField = 0;
            this.chromaDelay = [];
            this.chromaDelayIndex = 0;
            this.lines = [];
            this.currLine = { x1: 0, y: 0, x2: 0, maxPhase: 0, colors: [] };
            this.lastClear = 0;
            this.clearInterval = cfg.clearInterval;
            this.overScan = cfg.overScan;
            this.hOffset = cfg.hOffset;
            this.pulseLength = cfg.pulseLength;
            
            this.canvas = config.canvas;
            this.ctx = this.canvas.getContext('2d');
            this.width = this.canvas.width;
            this.height = this.canvas.height;
            this.lineWidth = cfg.lineWidth;
            this.blend = cfg.blend;
            this.brightness = cfg.brightness;
            this.saturation = cfg.saturation;
            
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            this.sampleRate = this.audioCtx.sampleRate;
            this.hFreqTarget = 1.0 / cfg.hFreq * this.sampleRate;
            this.vFreqTarget = 1.0 / cfg.vFreq * this.sampleRate;
            this.hFreq = this.hFreqTarget;
            this.vFreq = this.vFreqTarget;
            
            this.requestID = null;
            this.draw();
        }
        
        activate() {
            this.audioCtx.resume();
        }
        
        hPhaseToX(hPhase, vPhase, field) {
            return ((hPhase - this.hOffset) / this.overScan) * this.width;
        }
        
        vPhaseToY(hPhase, vPhase, field) {
            return (vPhase + (field / this.vFreq) * this.hFreq * 0.5) * this.height;
        }
        
        YCbCrToRGB(y, cb, cr) {
            let r = y + 45 * cr / 32;
            let g = y - (11 * cb + 23 * cr) / 32;
            let b = y + 113 * cb / 64;
            return [r, g, b];
        }
        
        process(lSamples, cSamples) {
            const sampleRate = this.sampleRate;
            if (!this.s) this.s = { LMin: -0.025, LMax: 0.025, CMin: -0.05, CMax: 0.05 };
            const s = this.s;
            const p = this.pulse;
            
            for (let i = 0; i < lSamples.length; i++) {
                this.timing.time += 1;
                
                let lSample = lSamples[i];
                let cSample = cSamples[i];
                
                if (lSample < s.LMin) s.LMin = lSample;
                if (lSample > s.LMax) s.LMax = lSample;
                s.LMin *= 1.0 - (1.0 / sampleRate);
                s.LMax *= 1.0 - (1.0 / sampleRate);
                if (s.LMin > -0.025) s.LMin = -0.025;
                if (s.LMax < 0.025) s.LMax = 0.025;
                
                if (cSample < s.CMin) s.CMin = cSample;
                if (cSample > s.CMax) s.CMax = cSample;
                s.CMin *= 1.0 - (1.0 / sampleRate);
                s.CMax *= 1.0 - (1.0 / sampleRate);
                if (s.CMin > -0.05) s.CMin = -0.05;
                if (s.CMax < 0.05) s.CMax = 0.05;
                
                let luma = (lSample * 2.0 - s.LMin) / (s.LMax - s.LMin) * this.brightness * 255;
                let chroma = (cSample * 2.0 - s.CMin) / (s.CMax - s.CMin) * this.saturation * 255;
                let chromaLast = this.chromaDelay[this.chromaDelayIndex] || 0;
                
                if (this.chromaDelayIndex < sampleRate / 10.0) {
                    this.chromaDelay[this.chromaDelayIndex] = chroma;
                    this.chromaDelayIndex++;
                }
                
                chroma -= 128;
                chromaLast -= 128;
                
                let r, g, b;
                if (this.chromaField === 0) {
                    [r, g, b] = this.YCbCrToRGB(luma, chromaLast, chroma);
                } else {
                    [r, g, b] = this.YCbCrToRGB(luma, chroma, chromaLast);
                }
                
                if (this.currLine.colors.length < 1024) {
                    this.currLine.colors.push({
                        phase: this.hPhase,
                        r: Math.max(Math.min(Math.round(r), 255), 0),
                        g: Math.max(Math.min(Math.round(g), 255), 0),
                        b: Math.max(Math.min(Math.round(b), 255), 0)
                    });
                }
                
                this.currLine.maxPhase = this.hPhase;
                this.hPhase += 1.0 / this.hFreq;
                this.vPhase += 1.0 / this.vFreq;
                this.currLine.x2 = this.hPhaseToX(this.hPhase, this.vPhase, this.field);
                
                let blank = false;
                
                if ((s.LMax - s.LMin) > 0.1 && (s.CMax - s.CMin) > 0.1) {
                    if (lSample < s.LMin * 0.5) p.luma = -1;
                    else if (lSample > s.LMax * 0.5) p.luma = 1;
                    else p.luma = 0;
                    
                    if (cSample < s.CMin * 0.5) p.chroma = -1;
                    else if (cSample > s.CMax * 0.5) p.chroma = 1;
                    else p.chroma = 0;
                    
                    if (p.luma !== p.lumaPrev || p.chroma !== p.chromaPrev) {
                        p.time = 0;
                        p.lumaPrev = p.luma;
                        p.chromaPrev = p.chroma;
                        p.changed = true;
                    }
                    
                    if (p.luma !== 0 && p.chroma !== 0) {
                        p.time += 1.0 / sampleRate;
                        
                        if (p.time > this.pulseLength * 0.5 && p.changed) {
                            p.changed = false;
                            
                            if (!p.ready) {
                                p.ready = true;
                                p.timeout = this.pulseLength * 1.25;
                            } else {
                                p.ready = false;
                                blank = true;
                                
                                if ((this.timing.time - this.timing.lastH < this.hFreqTarget * 1.5) &&
                                    (this.timing.time - this.timing.lastH > this.hFreqTarget * 0.5)) {
                                    this.hFreq = this.hFreq * 0.9 + (this.timing.time - this.timing.lastH) * 0.1;
                                }
                                
                                this.timing.lastH = this.timing.time;
                                this.hPhase = 0;
                                this.chromaDelayIndex = 0;
                                
                                this.chromaField = p.luma > 0 ? 0 : 1;
                                
                                if (p.luma !== p.chroma) {
                                    if ((this.timing.time - this.timing.lastV < this.vFreqTarget * 1.5) &&
                                        (this.timing.time - this.timing.lastV > this.vFreqTarget * 0.5)) {
                                        this.vFreq = this.vFreq * 0.75 + (this.timing.time - this.timing.lastV) * 0.25;
                                    }
                                    this.timing.lastV = this.timing.time;
                                    this.vPhase = 0;
                                    this.chromaField = 1;
                                    this.field = p.luma > 0 ? 0 : 1;
                                }
                            }
                        }
                    }
                }
                
                this.hFreq = this.hFreq * (1.0 - 1.0 / sampleRate) + this.hFreqTarget * (1.0 / sampleRate);
                this.vFreq = this.vFreq * (1.0 - 1.0 / sampleRate) + this.vFreqTarget * (1.0 / sampleRate);
                
                if (this.hPhase >= 1.0) {
                    blank = true;
                    this.hPhase -= 1.0;
                    this.chromaDelayIndex = 0;
                    this.chromaField = this.chromaField === 1 ? 0 : 1;
                }
                
                if (this.vPhase >= 1.0) {
                    blank = true;
                    this.vPhase -= 1.0;
                    this.field = this.field === 0 ? 1 : 0;
                }
                
                if (blank) {
                    if (this.lines.length < 1024 && this.currLine.colors.length > 5 && this.currLine.maxPhase > 0) {
                        this.lines.push(this.currLine);
                    }
                    
                    this.currLine = {
                        x1: this.hPhaseToX(this.hPhase, this.vPhase, this.field),
                        y: this.vPhaseToY(this.hPhase, this.vPhase, this.field),
                        x2: 0,
                        maxPhase: 0,
                        colors: []
                    };
                    blank = false;
                }
            }
        }
        
        draw() {
            this.requestID = requestAnimationFrame(() => this.draw());
            
            if (Date.now() - this.lastClear > this.clearInterval) {
                this.ctx.fillStyle = 'rgba(0,0,0,0.05)';
                this.ctx.globalCompositeOperation = 'source-over';
                this.ctx.fillRect(0, 0, this.width, this.height);
                this.lastClear = Date.now();
            }
            
            if (this.blend) {
                this.ctx.globalCompositeOperation = 'screen';
            }
            
            this.ctx.lineWidth = this.lineWidth;
            
            for (let line of this.lines) {
                const grd = this.ctx.createLinearGradient(line.x1, line.y, line.x2, line.y);
                
                for (let color of line.colors) {
                    grd.addColorStop(color.phase / line.maxPhase, `rgb(${color.r},${color.g},${color.b})`);
                }
                
                this.ctx.beginPath();
                this.ctx.moveTo(line.x1 + Math.random() * 2.0 - 1.0, line.y + Math.random() * 2.0 - 1.0);
                this.ctx.lineTo(line.x2 + Math.random() * 2.0 - 1.0, line.y + Math.random() * 2.0 - 1.0);
                this.ctx.strokeStyle = grd;
                this.ctx.stroke();
            }
            
            this.lines = [];
        }
        
        stop() {
            if (this.requestID) {
                cancelAnimationFrame(this.requestID);
            }
        }
    }
    
    // ============================================
    // MAIN APPLICATION
    // ============================================
    const sourceCanvas = document.getElementById('source');
    const encodedCanvas = document.getElementById('encoded');
    const decodedCanvas = document.getElementById('decoded');
    const startBtn = document.getElementById('startBtn');
    const statusEl = document.getElementById('status');
    
    const sourceCtx = sourceCanvas.getContext('2d');
    const encodedCtx = encodedCanvas.getContext('2d');
    
    let video = null;
    let encoder = null;
    let decoder = null;
    let audioCtx = null;
    let audioOutputNode = null;
    let isRunning = false;
    let audioQueue = { left: [], right: [] };
    let audioQueueReadIndex = 0;

    function init() {
        encoder = new SlowscanEncoder({
            sampleRate: 96000,
            fps: parseFloat(document.getElementById('fps').value),
            lines: parseInt(document.getElementById('lines').value)
        });

        decoder = new SlowscanDecoder({
            canvas: decodedCanvas,
            lineWidth: parseFloat(document.getElementById('lineWidth').value),
            brightness: parseFloat(document.getElementById('brightness').value),
            saturation: parseFloat(document.getElementById('saturation').value),
            blend: document.getElementById('blend').checked
        });

        audioCtx = decoder.audioCtx;

        // Create ScriptProcessorNode for continuous audio output
        audioOutputNode = audioCtx.createScriptProcessor(2048, 0, 2);
        audioOutputNode.onaudioprocess = function(e) {
            const leftOut = e.outputBuffer.getChannelData(0);
            const rightOut = e.outputBuffer.getChannelData(1);

            for (let i = 0; i < leftOut.length; i++) {
                if (audioQueueReadIndex < audioQueue.left.length) {
                    leftOut[i] = audioQueue.left[audioQueueReadIndex] * 0.5;
                    rightOut[i] = audioQueue.right[audioQueueReadIndex] * 0.5;
                    audioQueueReadIndex++;
                } else {
                    leftOut[i] = 0;
                    rightOut[i] = 0;
                }
            }

            // Trim consumed samples from queue periodically
            if (audioQueueReadIndex > 48000) {
                audioQueue.left = audioQueue.left.slice(audioQueueReadIndex);
                audioQueue.right = audioQueue.right.slice(audioQueueReadIndex);
                audioQueueReadIndex = 0;
            }
        };
        audioOutputNode.connect(audioCtx.destination);
    }
    
    function visualizeEncoded(left, right) {
        const w = encodedCanvas.width;
        const h = encodedCanvas.height;
        const step = Math.ceil(left.length / w);
        
        encodedCtx.fillStyle = '#000';
        encodedCtx.fillRect(0, 0, w, h);
        
        encodedCtx.beginPath();
        for (let x = 0; x < left.length; x += step) {
            const px = Math.floor(x / step);
            const py = (left[x] + 0.5) * h * 0.5;
            if (px === 0) encodedCtx.moveTo(px, py);
            else encodedCtx.lineTo(px, py);
        }
        encodedCtx.strokeStyle = '#0f0';
        encodedCtx.lineWidth = 1;
        encodedCtx.stroke();
        
        encodedCtx.beginPath();
        for (let x = 0; x < right.length; x += step) {
            const px = Math.floor(x / step);
            const py = (right[x] + 0.5) * h * 0.5 + h * 0.5;
            if (px === 0) encodedCtx.moveTo(px, py);
            else encodedCtx.lineTo(px, py);
        }
        encodedCtx.strokeStyle = '#f0f';
        encodedCtx.lineWidth = 1;
        encodedCtx.stroke();
    }
    
    // UI Control handlers
    document.getElementById('lines').addEventListener('input', function() {
        document.getElementById('linesVal').textContent = this.value;
    });
    
    document.getElementById('fps').addEventListener('input', function() {
        document.getElementById('fpsVal').textContent = this.value;
    });
    
    document.getElementById('lineWidth').addEventListener('input', function() {
        document.getElementById('lineWidthVal').textContent = this.value;
        if (decoder) decoder.lineWidth = parseFloat(this.value);
    });
    
    document.getElementById('brightness').addEventListener('input', function() {
        document.getElementById('brightnessVal').textContent = this.value;
        if (decoder) decoder.brightness = parseFloat(this.value);
    });
    
    document.getElementById('saturation').addEventListener('input', function() {
        document.getElementById('saturationVal').textContent = this.value;
        if (decoder) decoder.saturation = parseFloat(this.value);
    });
    
    document.getElementById('blend').addEventListener('change', function() {
        if (decoder) decoder.blend = this.checked;
    });
    
    async function startCamera() {
        try {
            video = document.createElement('video');
            video.width = sourceCanvas.width;
            video.height = sourceCanvas.height;
            video.autoplay = true;
            video.playsInline = true;
            
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 320, height: 150 }
            });
            video.srcObject = stream;
            
            return new Promise(resolve => {
                video.onloadedmetadata = () => {
                    resolve(video);
                };
            });
        } catch (err) {
            console.error('Camera error:', err);
            statusEl.textContent = 'Camera access denied: ' + err.message;
            throw err;
        }
    }
    
    function processFrame() {
        if (!isRunning || !video) {
            requestAnimationFrame(processFrame);
            return;
        }
        
        sourceCtx.drawImage(video, 0, 0, sourceCanvas.width, sourceCanvas.height);
        
        const frameData = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height).data;
        const { left, right } = encoder.encodeFrame(frameData, sourceCanvas.width, sourceCanvas.height);
        
        // Feed audio through decoder in chunks
        const bufferSize = 512;
        for (let i = 0; i < left.length; i += bufferSize) {
            const leftChunk = left.slice(i, i + bufferSize);
            const rightChunk = right.slice(i, i + bufferSize);
            decoder.process(leftChunk, rightChunk);
        }

        // Queue audio for playback through speakers
        for (let i = 0; i < left.length; i++) {
            audioQueue.left.push(left[i]);
            audioQueue.right.push(right[i]);
        }
        
        // Visualize encoded signal
        visualizeEncoded(left, right);
        
        // Schedule next frame based on FPS
        const fps = parseFloat(document.getElementById('fps').value);
        const frameInterval = 1000 / fps;
        setTimeout(() => requestAnimationFrame(processFrame), frameInterval);
    }
    
    startBtn.addEventListener('click', async function() {
        startBtn.style.display = 'none';
        statusEl.textContent = 'Initializing...';
        
        try {
            init();
            await startCamera();
            decoder.activate();
            isRunning = true;
            statusEl.textContent = 'Running: Camera -> Encoder -> Decoder -> Display';
            processFrame();
        } catch (err) {
            statusEl.textContent = 'Error: ' + err.message;
        }
    });
    </script>
</body>
</html>
